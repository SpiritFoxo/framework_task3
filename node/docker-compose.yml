services:
  # Учебный режим — подробные ошибки, мягкие лимиты
  app-dev:
    build: .
    ports:
      - "3000:3000"
    environment:
      APP_MODE: учебный
      APP_PORT: 3000
      APP_TRUSTED_ORIGINS: "http://localhost:5173,https://example.edu"
      APP_READ_PER_MINUTE: 60
      APP_WRITE_PER_MINUTE: 20

  # Боевой режим — нейтральные ошибки, строгие лимиты
  app-prod:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_MODE: боевой
      APP_PORT: 8080
      APP_TRUSTED_ORIGINS: "https://example.edu"
      APP_READ_PER_MINUTE: 30
      APP_WRITE_PER_MINUTE: 5
